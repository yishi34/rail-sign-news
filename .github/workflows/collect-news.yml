name: ニュース自動収集

on:
  schedule:
    # GitHub Actions のスケジュールは世界標準時(UTC)で指定する
    # 21:00 UTC = 翌日 6:00 JST / 9:00 UTC = 18:00 JST
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"
  # GitHubの画面から手動でも実行できるようにする
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ニュースを収集
        run: node scripts/collect-news.mjs

      - name: 変更があればコミットして反映
        run: |
          if git diff --quiet data/articles.json; then
            echo "新しい記事はありませんでした"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git commit -m "chore: 定時ニュース収集 ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') JST)"
          git push
